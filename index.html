<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="manifest" href="/manifest.json">
  <title>Wasm Steam Deck Foundation</title>
</head>
<body>
  <canvas id="deck-screen"></canvas>

  <div id="debug-overlay">
    <h2>🎮 Wasm Deck OS Status</h2>
    <hr>
    <div>🔒 クロスオリジン隔離: <span id="status-sab">検査中...</span></div>
    <div>💾 OPFS I/O テスト: <span id="status-opfs">検査中...</span></div>
    <div>🕹️ コントローラー: <span id="status-gamepad">未接続</span></div>
    
    <hr style="margin: 10px 0; border-color: #444;">
    <h3>🌐 HTTP Range / スパースI/O 実験</h3>
    <div style="margin-top: 8px;">
      <button id="btn-fetch-head" style="padding: 5px 8px; margin-right: 5px; cursor: pointer;">① 0MB目を1KB取得</button>
      <button id="btn-fetch-tail" style="padding: 5px 8px; cursor: pointer;">② 10MB目を1KB取得</button>
    </div>
    <div style="margin-top: 8px;">📊 仮想ディスクの物理サイズ: <span id="disk-size" style="color: #ffaa00; font-weight: bold;">0</span> 内部バイト</div>
    <div id="stream-log" style="font-size: 11px; color: #aaa; margin-top: 5px; background: #000; padding: 5px; border-radius: 4px; max-height: 60px; overflow-y: auto;">ログを待機中...</div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
