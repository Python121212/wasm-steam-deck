<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="manifest" href="/manifest.json">
  <title>Wasm Steam Deck Foundation</title>
  <style>
    #debug-overlay {
      position: fixed !important;
      top: 10px !important;
      left: 10px !important;
      width: calc(100% - 20px) !important;
      max-width: 400px !important;
      z-index: 99999 !important;
      background: rgba(15, 15, 15, 0.95) !important;
      border: 2px solid #333 !important;
      padding: 15px !important;
      box-sizing: border-box !important;
      /* ➔ 下のレイヤーにタップを逃さない */
      pointer-events: auto !important;
      touch-action: auto !important;
    }
    button {
      padding: 12px 15px !important;
      font-size: 14px !important;
      margin: 5px !important;
      cursor: pointer !important;
      background: #333 !important;
      color: #fff !important;
      border: 1px solid #555 !important;
      border-radius: 6px !important;
      /* ➔ ボタン単体でもタッチを確実に奪取 */
      pointer-events: auto !important;
      touch-action: manipulation !important;
    }
    button:active {
      background: #555 !important;
    }
  </style>
</head>
<body>
  <canvas id="deck-screen"></canvas>

  <div id="debug-overlay">
    <h2>🎮 Wasm Deck OS Status</h2>
    <hr>
    <div>🔒 クロスオリジン隔離: <span id="status-sab">検査中...</span></div>
    <div>💾 OPFS I/O テスト: <span id="status-opfs">検査中...</span></div>
    <div>🕹️ コントローラー: <span id="status-gamepad">未接続</span></div>
    
    <hr style="margin: 10px 0; border-color: #444;">
    <h3>🌐 HTTP Range / スパースI/O 実験</h3>
    <div style="margin-top: 8px; display: flex; flex-wrap: wrap;">
      <button id="btn-fetch-head">① 0MB目を1KB取得</button>
      <button id="btn-fetch-tail">② 10MB目を1KB取得</button>
    </div>
    <div style="margin-top: 8px;">📊 仮想ディスクの物理サイズ: <span id="disk-size" style="color: #ffaa00; font-weight: bold;">0</span> 内部バイト</div>
    <div id="stream-log" style="font-size: 13px; color: #aaa; margin-top: 8px; background: #000; padding: 8px; border-radius: 4px; min-height: 40px; word-break: break-all;">ログを待機中...</div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
